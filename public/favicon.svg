<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1890C5"/>
      <stop offset="100%" stop-color="#0A4E7E"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background — blue gradient (matches app store icon) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
